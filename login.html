<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Foodie.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="Style.css">
    <link rel="stylesheet" href="Media-query.css">
</head>

<body>
    <main class="auth-page">
        <section class="auth-shell">
            <div class="auth-brand">
                <a href="Index.html" class="auth-logo">Foodie.</a>
                <div class="auth-brand-content">
                    <span class="auth-badge">Exclusive member offers</span>
                    <h1>Sign in to exclusive products and discounts</h1>
                    <p>Access your saved orders, faster checkout, special coupons, and fresh food deals made just for you.</p>
                </div>
                <img src="images/delivery-boy-with-phone.png" alt="Food delivery partner">
            </div>

            <div class="auth-card">
                <a href="Index.html" class="auth-back">
                    <i class="fa-solid fa-arrow-left"></i>
                    Back to home
                </a>

                <div class="auth-heading">
                    <p>Welcome back</p>
                    <h2>Sign In</h2>
                </div>

                <form class="auth-form">
                    <label for="email">Email Address</label>
                    <div class="input-group">
                        <i class="fa-regular fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" autocomplete="email" required>
                    </div>

                    <label for="password">Password</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>

                    <div class="auth-options">
                        <label class="remember-me">
                            <input type="checkbox">
                            Remember me
                        </label>
                        <a href="#">Forgot Password?</a>
                    </div>

                    <button type="submit" class="auth-submit">Sign In</button>
                </form>

                <p class="auth-switch">
                    New to Foodie?
                    <a href="sign.html">Create Account</a>
                </p>
            </div>
        </section>
    </main>
</body>

</html>
